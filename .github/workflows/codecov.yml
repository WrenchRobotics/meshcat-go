name: Code Coverage  # The name of the workflow that will appear on GitHub

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [1.25]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go }}

      - name: Install ZeroMQ prerequisites (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsodium-dev libzmq3-dev libczmq-dev

      - name: Install ZeroMQ prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config libsodium zeromq czmq

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-czmq

      - name: Install ZeroMQ prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "CGO_CFLAGS=-IC:\msys64\mingw64\include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-LC:\msys64\mingw64\lib" >> $env:GITHUB_ENV
          echo "CC=C:\msys64\mingw64\bin\gcc.exe" >> $env:GITHUB_ENV
          echo "PATH=C:\msys64\mingw64\bin;$env:PATH" >> $env:GITHUB_ENV

      - name: Verify ZeroMQ toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          gcc --version
          pkg-config --version
          pkg-config --modversion libzmq libczmq libsodium
          pkg-config --libs libzmq libczmq libsodium

      - name: Build
        run: go install ./...

      - name: Test Coverage
        shell: bash
        run: |
          go test -v -cover $(go list ./... | grep -v /examples/) -coverprofile coverage.out -coverpkg ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}