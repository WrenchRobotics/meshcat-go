name: Code Coverage  # The name of the workflow that will appear on GitHub

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [1.25]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go }}

      - name: Install ZeroMQ prerequisites (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsodium-dev libzmq3-dev libczmq-dev

      - name: Install ZeroMQ prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config libsodium zeromq czmq

      - name: Install ZeroMQ prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite
          vcpkg install libsodium:x64-mingw-dynamic zeromq:x64-mingw-dynamic czmq:x64-mingw-dynamic
          echo "PKG_CONFIG_PATH=C:\vcpkg\installed\x64-mingw-dynamic\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "CGO_CFLAGS=-IC:\vcpkg\installed\x64-mingw-dynamic\include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-LC:\vcpkg\installed\x64-mingw-dynamic\lib" >> $env:GITHUB_ENV
          echo "PATH=C:\vcpkg\installed\x64-mingw-dynamic\bin;$env:PATH" >> $env:GITHUB_ENV

      - name: Build
        run: go install ./...

      - name: Test Coverage
        run: |
          go test -v -cover $(go list ./... | grep -v /examples/) -coverprofile coverage.out -coverpkg ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}