name: Code Coverage  # The name of the workflow that will appear on Github

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [1.23]
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go }}

      - name: Install ZeroMQ prerequisites (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsodium-dev libzmq3-dev libczmq-dev

      - name: Install ZeroMQ prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config libsodium zeromq czmq

      - name: Install ZeroMQ prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite zeromq

      - name: Build
        run: go install ./...

      - name: Test Coverage
        run: |
          go test -v -cover $(go list ./... | grep -v /examples/) -coverprofile coverage.out -coverpkg ./...
          go tool cover -func coverage.out -o coverage2.out  

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out